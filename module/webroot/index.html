<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSU WebUI demo</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
</head>

<body>
    <header class="header">
        <div class="header-content">KSU WebUI demo</div>
    </header>
    <main class="content page-shell">
        <div class="content-container page-content">
            <div class="catalog">
                <section class="hero-block">
                    <h1 class="list-title">Catalog</h1>
                </section>

                <nav class="catalog-list" aria-label="Feature demos">
                    <a class="catalog-link ripple-element" href="pages/dialog.html">Dialog — alert, confirm, prompt</a>
                    <a class="catalog-link ripple-element" href="pages/exec.html">Exec & Spawn</a>
                    <a class="catalog-link ripple-element" href="pages/file.html">File upload</a>
                    <a class="catalog-link ripple-element" href="pages/insets.html">Insets & Monet colors</a>
                    <a class="catalog-link ripple-element" href="pages/pm.html">Package Manager API</a>
                </nav>

                <section id="catalogPrerequisiteCode" class="demo-card feature-card"
                    aria-labelledby="catalogPrerequisiteTitle">
                    <div class="feature-card-demo">
                        <h2 id="catalogPrerequisiteTitle" class="page-title">Pre-requisite</h2>
                    </div>
                    <div class="feature-card-code">
                        <div class="code-demo">
                            <div class="code-demo-header">
                                <div class="code-demo-title">bash</div>
                                <button type="button" class="copy-code-button ripple-element">copy</button>
                            </div>
                            <div class="code-demo-markdown"></div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>
    <div class="footer-placeholder"></div>
    <script src="assets/highlight.min.js"></script>
    <script src="assets/marked.umd.js"></script>
    <script src="assets/marked-highlight.umd.js"></script>
    <script type="module" src="index.js"></script>
</body>

</html>
