<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File</title>
    <link rel="stylesheet" href="../styles.css" type="text/css">
</head>

<body>
    <header class="header">
        <a class="back-btn ripple-element" href="javascript:history.back()" aria-label="Go back">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z" /></svg>
        </a>
        <div class="header-content">File upload</div>
    </header>
    <main class="content page-shell">
        <div class="content-container page-content">
            <section class="demo-section demo-card feature-card">
                <div class="feature-card-demo">
                    <h1 class="page-title">File upload</h1>
                    <p class="demo-description">Select a file and simulate chunked progress updates in the browser.</p>
                    <div class="upload-container">
                        <button type="button" id="selectFileButton" class="btn ripple-element">Select File</button>
                        <input type="file" id="fileUpload" class="hide">
                        <div id="uploadProgress" class="progress-container hide">
                            <div class="progress-bar">
                                <div class="progress-fill"></div>
                            </div>
                            <div class="progress-status">
                                <span id="fileInfo">No file selected</span>
                                <span id="progressText">0%</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="fileCode" class="feature-card-code">
                    <div class="code-demo">
                        <div class="code-demo-header">
                            <div class="code-demo-title">js</div>
                            <button type="button" class="copy-code-button ripple-element">copy</button>
                        </div>
                        <div class="code-demo-markdown"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <div class="footer-placeholder"></div>
    <script src="../assets/highlight.min.js"></script>
    <script src="../assets/marked.umd.js"></script>
    <script src="../assets/marked-highlight.umd.js"></script>
    <script type="module" src="../js/file.js"></script>
</body>

</html>
