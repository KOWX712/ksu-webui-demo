<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialog</title>
    <link rel="stylesheet" href="../styles.css" type="text/css">
</head>

<body>
    <header class="header">
        <a class="back-btn ripple-element" href="javascript:history.back()" aria-label="Go back">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
                <path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z" />
            </svg>
        </a>
        <div class="header-content">Dialog</div>
    </header>
    <main class="content page-shell">
        <div class="content-container page-content">
            <section class="demo-section demo-card feature-card">
                <div class="feature-card-demo">
                    <h1 class="page-title">Alert dialog</h1>
                    <p class="demo-description">Show a simple alert dialog.</p>
                    <div class="feature-card-actions">
                        <button type="button" id="alertButton" class="btn ripple-element">Open alert</button>
                    </div>
                </div>
                <div id="alertCode" class="feature-card-code">
                    <div class="code-demo">
                        <div class="code-demo-header">
                            <div class="code-demo-title">js</div>
                            <button type="button" class="copy-code-button ripple-element">copy</button>
                        </div>
                        <div class="code-demo-markdown"></div>
                    </div>
                </div>
            </section>
            <section class="demo-section demo-card feature-card">
                <div class="feature-card-demo">
                    <h1 class="page-title">Confirm dialog</h1>
                    <p class="demo-description">Ask the user to confirm an action and return a boolean result.</p>
                    <div class="feature-card-actions">
                        <button type="button" id="confirmButton" class="btn ripple-element">Open confirm</button>
                    </div>
                </div>
                <div id="confirmCode" class="feature-card-code">
                    <div class="code-demo">
                        <div class="code-demo-header">
                            <div class="code-demo-title">js</div>
                            <button type="button" class="copy-code-button ripple-element">copy</button>
                        </div>
                        <div class="code-demo-markdown"></div>
                    </div>
                </div>
            </section>
            <section class="demo-section demo-card feature-card">
                <div class="feature-card-demo">
                    <h1 class="page-title">Prompt dialog</h1>
                    <p class="demo-description">Collect a short string value with the built-in prompt dialog.</p>
                    <div class="feature-card-actions">
                        <button type="button" id="promptButton" class="btn ripple-element">Open prompt</button>
                    </div>
                </div>
                <div id="promptCode" class="feature-card-code">
                    <div class="code-demo">
                        <div class="code-demo-header">
                            <div class="code-demo-title">js</div>
                            <button type="button" class="copy-code-button ripple-element">copy</button>
                        </div>
                        <div class="code-demo-markdown"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <div class="footer-placeholder"></div>
    <script src="../assets/highlight.min.js"></script>
    <script src="../assets/marked.umd.js"></script>
    <script src="../assets/marked-highlight.umd.js"></script>
    <script type="module" src="../js/dialog.js"></script>
</body>

</html>
